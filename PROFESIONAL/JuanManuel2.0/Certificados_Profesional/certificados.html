<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atención Profesional</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
          <div class="logo">
            <img src="../Imagenes/LogoTranquilidad.jpg" alt="Logo de Atención Profesional">
            <span>Atención Profesional</span>
          </div>
          <div class="servicios">
            <span>Servicios</span>
            <div class="submenu">
              <ul>
                <li>Biblioterapia</li>
                <li>Arteterapia</li>
                <li>Musicoterapia</li>
                <li>Ejercicios</li>
              </ul>
            </div>
          </div> 
          <div class="user-info">
            <span>Juanito Alimaña</span>
            <img class="imagen-usuario" src="../Imagenes/FotoUsuario.png" alt="Foto de perfil del usuario">
          </div>
        </nav>
      </header>
        <main>
            <div class="certificate-section">
                <h2>Certificados del Profesional</h2>
                <ul class="certificate-list" id="certificates">
                    <!-- Lista de certificados -->
                </ul>
            </div>
        </main>
        <footer class="footer">
            <div class="footer-links">
                <div class="contactanos">
                  <span>Contactanos</span>
                    <div class="imagenes-container">
                      <img class="imagen-footer" src="Whatsapp.png" alt="Whatsapp">
                      <img class="imagen-footer" src="Telegram.png" alt="Telegram">
                    </div>
                </div>
              </div>
              <div class="canales-atencion">
                <span>Canales de atencion</span>
                  <div class="imagenes-container">
                    <img class="imagen-footer" src="correo.png" alt="Correo">
                  </div>
              </div>
              <div class="social-media">
                <span>Redes Sociales</span>
                  <div class="imagenes-container">
                    <img class="imagen-footer" src="facebook.png" alt="Facebook">
                    <img class="imagen-footer" src="instagram.png" alt="Instagram">
                  </div>
              </div>
            </div>
            <div class="texto-footer">
              <span>¿Quienes somos? </span>
            </div>
          </footer>
    </div>
    <script>
        // Función para simular la carga de certificados en la lista
        function loadCertificates() {
            const certificates = [
                'Certificado de Psicología Clínica',
                'Certificado de Terapia Cognitivo-Conductual',
                'Certificado de Mindfulness y Meditación'
            ];

            const certificatesList = document.getElementById('certificates');

            certificates.forEach(certificate => {
                const li = document.createElement('li');
                li.textContent = certificate;
                certificatesList.appendChild(li);
            });
        }

        // Llamar a la función para cargar los certificados cuando la página se carga
        window.onload = loadCertificates;
    </script>
</body>
</html>
