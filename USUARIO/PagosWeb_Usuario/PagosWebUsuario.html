<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="style.css">
    <title>Atención Profesional</title>
    </head>
    <body>
        <header>
            <nav class="navbar">
                <div class="logo">
                    <a href="../Home_Usuario/HomeUsuario.html"><img src="../Imagenes/LogoTranquilidad.jpg" alt="Logo de Atención Profesional"></a>
                <span>Atención Profesional</span>
                </div>
                <div class="servicios">
                <span>Servicios</span>
                <div class="submenu">
                    <ul>
                    <li>Biblioterapia</li>
                    <li>Arteterapia</li>
                    <li>Musicoterapia</li>
                    <li>Ejercicios</li>

                </div>
                </div>
                <div class="user-info">

                <img class="imagen-usuario" src="../Imagenes/FotoUsuario.png" alt="Foto de perfil del usuario">

        <main class="body">
            <div class="formulario">
                <h1>Pago Seguro</h1>
                <form>
                    <div class="input-group">
                        <input type="text" class="casilla" placeholder="Numero de tarjeta" required>
                    </div>
                    <div class="input-group">
                        <input type="text" class="casilla" placeholder="Nombre del titulas" required>
                    </div>
                    <div>
                    <input type="text" class="casilla2" placeholder="Fecha de Expiración (MM/AA)" required>
                    <input type="text" class="casilla2" placeholder="Codigo de seguridad" required>
                    </div>

                    <div class="recordar-tarjeta">
                        <input type="checkbox" id="remember-card">
                        <label for="remember-card"> Recordar tarjeta</label>
                    </div>
    
                    <a href="../Home_Usuario/HomeUsuario.html"><button type="" class="pagar-button">Pagar</button></a>
                </form>
            </div>
    
         
        </main>

  <footer class="footer">
    <div class="footer-links">
        <div class="contactanos">
        <span>Contactanos</span>
            <div class="imagenes-container">
            <img class="imagen-footer" src="../Imagenes/WhatsApp.png" alt="Whatsapp">
            <img class="imagen-footer" src="../Imagenes/Telegram App.png" alt="Telegram">
            </div>
        </div>
    </div>
    <div class="canales-atencion">
        <span>Canales de atencion</span>
        <div class="imagenes-container">
            <img class="imagen-footer" src="../Imagenes/Email.png" alt="Correo">
        </div>
    </div>
    <div class="social-media">
        <span>Redes Sociales</span>
        <div class="imagenes-container">
            <img class="imagen-footer" src="../Imagenes/Facebook.png" alt="Facebook">
            <img class="imagen-footer" src="../Imagenes/Instagram.png" alt="Instagram">
        </div>
    </div>
    </div>
    <div class="texto-footer">
    <span>¿Quienes somos? </span>
    </div>
