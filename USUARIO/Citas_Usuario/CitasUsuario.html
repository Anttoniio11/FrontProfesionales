<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Atención Profesional</title>
</head>
<body>
  <nav class="navbar">
    <div class="logo">
      <a href="../Home_Usuario/HomeUsuario.html"><img src="../Imagenes/LogoTranquilidad.jpg" alt="Logo de Atención Profesional"></a>
      <span>Atención Profesional</span>
    </div>
    <div class="servicios">
      <span id="servicios-button">Servicios</span>
      <div class="submenu">
        <ul>
          <li>Biblioterapia</li>
          <li>Arteterapia</li>
          <li>Musicoterapia</li>
          <li>Ejercicios</li>
        </ul>
      </div>
    </div>
    <div class="user-info">
      <span>Juanito Alimaña</span>
      <img class="imagen-usuario" src="../Imagenes/FotoUsuario.png" alt="Foto de perfil del usuario">
    </div>
  </nav>
  <main class="body-content">
    <div class="container">
        <a href="../AgendarCita_Usuario/AgendarCitaUsuario.html">
        <div class="card">
          <img src="../Imagenes/AgendarCita.png" alt="">
          <h3>Agendar Cita</h3>
        </div>
      </a>
      <a href="../CancelarCita_Usuario/CancelarCitaUsuario.html">
        <div class="card">
          <img src="../Imagenes/CancelarCitas.png" alt="">
          <h3>Cancelar Cita</h3>
        </div>
      </a>
      <a href="../CitasProgramadas_Usuario/CitasProgramadasUsuario.html">
        <div class="card">
          <img src="../Imagenes/CitasProgramadas.png" alt="">
          <h3>Citas Programaadas</h3>
        </div>
      </a>
    </div>
  </main>
  <footer class="footer">
    <div class="footer-links">
      <div class="contactanos">
        <span>Contactanos</span>
        <img src="Whatsapp.png" alt="Whatsapp">
        <img src="Telegram.png" alt="Telegram">
      </div>
      <div class="canales-atencion">
        <span>Canales de atención</span>
        <img src="correo.png" alt="Correo">
      </div>
      <div class="social-media">
        <span>Redes Sociales</span>
        <img src="facebook.png" alt="Facebook">
        <img src="instagram.png" alt="Instagram">
      </div>
    </div>
    <div class="texto-footer">
      <span>¿Quiénes somos?</span>
    </div>
  </footer>
</body>
</html>
