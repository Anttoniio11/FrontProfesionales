<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="style.css">
  <title>Atención Profesional</title>
</head>
<body>
 
<header>
  <nav class="navbar">
    <div class="logo">
      <a href="../Home_Usuario/HomeUsuario.html"><img src="../Imagenes/LogoTranquilidad.jpg" alt="Logo de Atención Profesional"></a>
      <span>Atención Profesional</span>
    </div>
    <div class="servicios">
      <span>Servicios</span>
      <div class="submenu">
        <ul>
          <li>Biblioterapia</li>
          <li>Arteterapia</li>
          <li>Musicoterapia</li>
          <li>Ejercicios</li>
        </ul>
      </div>
    </div>
    <div class="user-info">
      <span>Juanito Alimaña</span>
      <img class="imagen-usuario" src="../Imagenes/FotoUsuario.png" alt="Foto de perfil del usuario">
    </div>
  </nav>
</header>

<div class="background-animation">
  <div class="ball ball1"></div>
  <div class="ball ball2"></div>
</div>

<main class="body">
  <h2>Anamnesis Inicial</h2>
  <div class="container">
    <form>
      <div class="pregunta">
        <label for="tratamiento">¿Existen antecedentes psicologicos en su familia?</label><br>
        <input type="radio" id="si" name="tratamiento" value="si">
        <label for="si">Sí</label>
        <input type="radio" id="no" name="tratamiento" value="no">
        <label for="no">No</label> <br><br>
        <label for="nombre">¿Cuales?:</label>
        <input type="text" id="nombre" name="nombre">
      </div>
      <div class="pregunta">
        <label for="tratamiento">¿Ha recibido tratamiento profesional para sus problemas, anteriormente?</label><br>
        <input type="radio" id="si" name="tratamiento" value="si">
        <label for="si">Sí</label>
        <input type="radio" id="no" name="tratamiento" value="no">
        <label for="no">No</label>
      </div>
      <div class="pregunta">
        <label for="problemas">¿Qué signos o sintomas experimenta actualmente?</label><br>
        <select id="problemas" name="problemas">
          <option value="ansiedad" disabled selected style="color: rgba(0, 0, 0, 0.5);">Elija una opcion</option>
          <option value="ansiedad">Ansiedad</option>
          <option value="depresion">tristeza</option>
          <option value="estres">Estrés</option>
          <option value="estres">Otro</option>
        </select>
      </div>
      <div class="pregunta">
        <label for="problemas">¿Actualmente consume medicamentos?</label><br>
        <input type="radio" id="si" name="tratamiento" value="si">
        <label for="si">Sí</label>
        <input type="radio" id="no" name="tratamiento" value="no">
        <label for="no">No</label> <br><br>
        <label for="nombre">¿Cuales?:</label>
        <input type="text" id="nombre" name="nombre">
        </select>
      </div>
      <div class="pregunta">
        <label for="impacto">¿En qué medida te afectan estos problemas en tu vida diaria?</label><br>
        <select id="impacto" name="impacto">
          <option value="ansiedad" disabled selected style="color: rgba(0, 0, 0, 0.5);">Elija una opcion</option>
          <option value="minimo">Mínimo</option>
          <option value="moderado">Moderado</option>
          <option value="severo">Severo</option>
        </select>
      </div>
      <div class="pregunta">
        <label for="tratamiento">¿Esta accediendo a esta plataforma de ayuda de manera voluntaria?</label><br>
        <input type="radio" id="si" name="tratamiento" value="si">
        <label for="si">Sí</label>
        <input type="radio" id="no" name="tratamiento" value="no">
        <label for="no">No</label>
      </div>
      
    </form>
    <a href="../Home_Usuario/HomeUsuario.html">
      <button>Enviar</button>
    </a>
  </div>
</main>

<footer class="footer">
  <div class="footer-links">
    <div class="contactanos">
      <span>Contactanos</span>
      <div class="imagenes-container">
        <img class="imagen-footer" src="../Imagenes/WhatsApp.png" alt="Whatsapp">
        <img class="imagen-footer" src="../Imagenes/Telegram App.png" alt="Telegram">
      </div>
    </div>
  </div>
  <div class="canales-atencion">
    <span>Canales de atencion</span>
    <div class="imagenes-container">
      <img class="imagen-footer" src="../Imagenes/Email.png" alt="Correo">
    </div>
  </div>
  <div class="social-media">
    <span>Redes Sociales</span>
    <div class="imagenes-container">
      <img class="imagen-footer" src="../Imagenes/Facebook.png" alt="Facebook">
      <img class="imagen-footer" src="../Imagenes/Instagram.png" alt="Instagram">
    </div>
  </div>
  <div class="texto-footer">
    <span>¿Quienes somos?</span>
  </div>
</footer>

</body>
</html>
